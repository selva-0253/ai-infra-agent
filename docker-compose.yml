version: '3.8'

services:
  ai-infra-agent:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PROJECT_ID: ${PROJECT_ID}
      REGION: ${REGION:-asia-south1}
      ZONE: ${ZONE:-asia-south1-a}
      GOOGLE_APPLICATION_CREDENTIALS: /app/sa-key.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/app/sa-key.json:ro
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
